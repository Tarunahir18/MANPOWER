<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Details – MANPOWER</title>
    <meta name="description" content="Enroll in sports at MANPOWER Sports Management System.">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<script>
    if(!localStorage.getItem('user')){
        alert("Please login first.");
        window.location.href = "../index.html";
    }
</script>

<!-- Navigation -->
<nav>
    <a href="../index.html" class="nav-brand">
        <img src="../assets/images/manpower-logo.png" alt="MANPOWER">
        <div>
            <span class="nav-brand-text">MANPOWER</span>
            <span class="nav-brand-sub">Sports Management</span>
        </div>
    </a>
    <button class="nav-hamburger" id="menuToggle" aria-label="Toggle menu">☰</button>
    <div class="nav-links" id="navLinks">
        <a href="../index.html">🏠 Home</a>
        <a href="games.html">🎮 Games</a>
        <a href="profile.html">👤 Profile</a>
        <a href="contact.html">✉️ Contact</a>
        <a href="#" id="logoutBtn" class="nav-logout">🚪 Logout</a>
    </div>
</nav>

<div class="page-container" style="max-width:900px;">
    <div class="glass-card" style="display:flex; gap:30px; flex-wrap:wrap;">
        <div style="flex:1; min-width:280px; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-subtle);">
            <img id="sportImage" src="../assets/images/stadium.png" alt="Sport Image" style="width:100%; height:100%; object-fit:cover; min-height:300px;">
        </div>
        <div style="flex:1; min-width:280px; display:flex; flex-direction:column; justify-content:center;">
            <h1 id="sportTitle" style="font-size:28px; margin-bottom:16px;">Loading...</h1>
            <p id="sportDesc" style="margin-bottom:20px;">Welcome to the official training and enrollment module. Prepare yourself for the ultimate competition.</p>
            
            <div class="event-card" style="margin-bottom:8px;"><strong style="color:var(--primary);">🔥 Status:</strong> Open for Enrollment</div>
            <div class="event-card" style="margin-bottom:20px;"><strong style="color:var(--primary);">👥 Participants:</strong> Fast filling — enroll now!</div>
            
            <button id="enrollBtn" class="btn-primary" onclick="confirmEnrollment()" style="width:100%; padding:16px; font-size:15px;">Confirm Enrollment →</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="../assets/js/script.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const gameName = urlParams.get('game') || 'General Sport';
    
    document.getElementById('sportTitle').innerText = gameName.toUpperCase();
    document.title = gameName + " – MANPOWER";

    const imgEl = document.getElementById('sportImage');
    const normalizedGame = gameName.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    
    // First, try loading the specific game image
    if (normalizedGame === 'chess') {
        imgEl.src = '../assets/images/chess.jpg';
        imgEl.alt = 'Chess Player';
    } else {
        imgEl.src = `../assets/images/game_${normalizedGame}.jpg`;
        imgEl.alt = gameName + ' Image';
        
        // Fallback to stadium.png if specific image not found
        imgEl.onerror = () => {
            imgEl.onerror = null;
            imgEl.src = '../assets/images/stadium.png';
        };
    }

    const localToast = (msg, error=false) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.borderLeftColor = error ? '#D32F2F' : '#E8680F';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };

    async function confirmEnrollment() {
        const btn = document.getElementById('enrollBtn');
        btn.innerText = "Processing...";
        btn.style.opacity = "0.7";
        btn.disabled = true;
        
        try {
            let userStr = localStorage.getItem('user');
            if(!userStr) {
                alert("Please login First!");
                window.location.assign('../index.html');
                return;
            }
            
            let user;
            try { user = JSON.parse(userStr); } catch(e) { user = {email: userStr, role: "user"}; }
            
            const response = await fetch((await detectApiUrl()) + '/users/enroll', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-user-role': user.role || 'user'
                },
                body: JSON.stringify({ email: user.email, gameName: gameName })
            });
            
            const data = await response.json();
            
            if(data.success) {
                localToast(`Successfully enrolled in ${gameName}!`);
                btn.innerText = "ALREADY ENROLLED ✓";
                btn.style.background = "var(--bg-card)";
                btn.style.color = "var(--primary)";
                btn.style.border = "1px solid var(--primary-border)";
                
                user.enrolled = user.enrolled || [];
                if(!user.enrolled.includes(gameName)) {
                    user.enrolled.push(gameName);
                    localStorage.setItem('user', JSON.stringify(user));
                }
            } else {
                localToast(data.message || "Enrollment Failed", true);
                btn.innerText = "Confirm Enrollment →";
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        } catch(e) {
            console.warn("API unavailable, running direct DB enrollment fallback...");
            const SUPABASE_URL = 'https://merpbfceascuopcgqwiw.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lcnBiZmNlYXNjdW9wY2dxd2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjA2ODcsImV4cCI6MjA5MTczNjY4N30.r-0Pz6l7N7N7S4wrpHpxCCv5JBSKhDgDmq3tl0Sq8ro';
            
            if (window.supabase) {
                try {
                    const _dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    let userStr = localStorage.getItem('user');
                    let user = JSON.parse(userStr);
                    
                    const { error } = await _dbClient.from('enrollments').insert([{
                        user_email: user.email,
                        game_name: gameName
                    }]);
                    
                    if (!error || (error.code === '23505')) { // Success or already enrolled
                        localToast(`Successfully enrolled in ${gameName} (Offline Sync)!`);
                        btn.innerText = "ALREADY ENROLLED ✓";
                        btn.style.background = "var(--bg-card)";
                        btn.style.color = "var(--primary)";
                        btn.style.border = "1px solid var(--primary-border)";
                        
                        user.enrolled = user.enrolled || [];
                        if(!user.enrolled.includes(gameName)) {
                            user.enrolled.push(gameName);
                            localStorage.setItem('user', JSON.stringify(user));
                        }
                        return;
                    }
                } catch(dbErr) {
                    // fall through
                }
            }
            
            localToast("System offline. Could not enroll.", true);
            btn.innerText = "Confirm Enrollment →";
            btn.disabled = false;
            btn.style.opacity = "1";
        }
    }

    async function detectApiUrl() {
        if (window.getApiUrl) return await window.getApiUrl();
        return 'http://localhost:3000/api/v1';
    }

    // Menu & Logout
    document.getElementById('logoutBtn').onclick = (e) => { e.preventDefault(); localStorage.removeItem('user'); window.location.href = '../index.html'; };
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    if (menuToggle && navLinks) {
        menuToggle.addEventListener('click', () => { navLinks.classList.toggle('expanded'); menuToggle.textContent = navLinks.classList.contains('expanded') ? '✕' : '☰'; });
    }
</script>
</body>
</html>
