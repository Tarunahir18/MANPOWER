<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management – MANPOWER Admin</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-subtle); }
        .admin-table th { background: var(--bg-card); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .product-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--bg-card); width: 100%; max-width: 500px; padding: 30px;
            border-radius: 20px; border: 1px solid var(--border-default);
            max-height: 90vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-default);
            background: var(--bg-input); color: var(--text-primary);
        }
    </style>
</head>
<body>

<nav>
    <a href="../index.html" class="nav-brand">
        <img src="../assets/images/manpower-logo.png" alt="MANPOWER">
        <div>
            <span class="nav-brand-text">MANPOWER</span>
            <span class="nav-brand-sub">Admin Panel</span>
        </div>
    </a>
    <div class="nav-links" id="navLinks">
        <a href="admin-dashboard.html">📈 Dashboard</a>
        <a href="admin-users.html">👥 Users</a>
        <a href="admin-store.html" class="active">🛒 Store Mgmt</a>
        <a href="contact.html">✉️ Messages</a>
        <a href="#" id="logoutBtn" class="nav-logout">🚪 Logout</a>
    </div>
</nav>

<div class="page-container-wide">
    <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
            <h1>🛒 Store <span style="color:var(--primary);">Management</span></h1>
            <p>Add, edit or remove products from the public store</p>
        </div>
        <button class="btn-primary" onclick="openModal()">+ Add New Product</button>
    </div>

    <div class="glass-card" style="margin-top: 30px;">
        <div style="overflow-x:auto;">
            <table class="admin-table" id="productTable">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productBody">
                    <!-- Products injected here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Product Modal -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-bottom:20px;">Add New Product</h2>
        <form id="productForm" onsubmit="saveProduct(event)">
            <input type="hidden" id="pid">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="pname" required placeholder="e.g. Elite Jersey">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="pcat" required>
                    <option value="Jerseys">Jerseys</option>
                    <option value="Equipment">Equipment</option>
                    <option value="Supplements">Supplements</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" step="0.01" id="pprice" required placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="url" id="pimg" placeholder="https://images.unsplash.com/...">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="pdesc" rows="3" placeholder="Brief product description..."></textarea>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="button" class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn-primary" style="flex:1">Save Product</button>
            </div>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="../assets/js/script.js"></script>
<script>
    // Admin check
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (user.role !== 'admin') { alert('Access Denied'); window.location.href = '../index.html'; }

    let products = [];

    // Alias for table row button calls
    function editProduct(id) { openModal(id); }

    const SUPABASE_URL = 'https://merpbfceascuopcgqwiw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lcnBiZmNlYXNjdW9wY2dxd2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjA2ODcsImV4cCI6MjA5MTczNjY4N30.r-0Pz6l7N7N7S4wrpHpxCCv5JBSKhDgDmq3tl0Sq8ro';

    function generateTextLogo(name, category) {
        const colors = {
            'Jerseys': ['#E8680F', '#091425'],
            'Equipment': ['#00897B', '#091425'],
            'Supplements': ['#1E88E5', '#091425'],
            'Other': ['#64748b', '#091425']
        };
        const [primary, bg] = colors[category] || colors['Other'];
        const svg = `
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="200" height="200" fill="${bg}"/>
            <text x="50%" y="55%" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">${name.substring(0,2).toUpperCase()}</text>
        </svg>`;
        return `data:image/svg+xml;base64,${btoa(svg)}`;
    }

    async function loadProducts() {
        const body = document.getElementById('productBody');
        if (body) body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">⏳ Loading products...</td></tr>';

        try {
            const res = await apiRequest('/products');
            products = Array.isArray(res) ? res : (res.products || []);
            renderTable();
        } catch (e) { 
            console.warn('[ADMIN STORE] API failed, trying Supabase...', e);
            if (window.supabase) {
                try {
                    const _db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    const { data, error } = await _db.from('products').select('*').order('id', { ascending: true });
                    if (!error && data) {
                        products = data;
                        renderTable();
                        return;
                    }
                } catch (err) { console.error('[SUPABASE ERROR]', err); }
            }
            if (body) body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--danger);">❌ Failed to load products. Page is offline and database is unreachable.</td></tr>';
            toasty("Failed to load products", "error");
        }
    }

    function renderTable() {
        const body = document.getElementById('productBody');
        if (!body) return;
        
        if (!products || products.length === 0) {
            body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted);">No products found in store.</td></tr>';
            return;
        }

        body.innerHTML = products.map(p => {
            const imgSrc = (p.image && p.image !== 'text') ? p.image : generateTextLogo(p.name, p.category);
            return `
            <tr>
                <td><img src="${imgSrc}" class="product-thumb" alt="${p.name}" onerror="this.src=generateTextLogo('${p.name}', '${p.category}')"></td>
                <td><strong>${p.name}</strong></td>
                <td><span class="badge" style="background:var(--bg-input); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem;">${p.category}</span></td>
                <td style="color:var(--primary); font-weight:700">$${p.price}</td>
                <td>
                    <button class="btn-sm" onclick="editProduct(${p.id})">Edit</button>
                    <button class="btn-sm" style="background:#ef4444; border:none; margin-left:5px; color:white;" onclick="deleteProduct(${p.id})">Delete</button>
                </td>
            </tr>
        `; }).join('');
    }

    function openModal(id = null) {
        document.getElementById('productForm').reset();
        document.getElementById('pid').value = id || '';
        document.getElementById('modalTitle').innerText = id ? 'Edit Product' : 'Add New Product';
        
        if (id) {
            const p = products.find(prod => prod.id == id);
            if (p) {
                document.getElementById('pname').value = p.name;
                document.getElementById('pcat').value = p.category;
                document.getElementById('pprice').value = p.price;
                document.getElementById('pimg').value = p.image;
                document.getElementById('pdesc').value = p.description;
            }
        }
        document.getElementById('productModal').classList.add('open');
    }

    function closeModal() { document.getElementById('productModal').classList.remove('open'); }

    async function saveProduct(e) {
        e.preventDefault();
        const id = document.getElementById('pid').value;
        const payload = {
            name: document.getElementById('pname').value,
            category: document.getElementById('pcat').value,
            price: document.getElementById('pprice').value,
            image: document.getElementById('pimg').value,
            description: document.getElementById('pdesc').value
        };

        try {
            const method = id ? 'PATCH' : 'POST';
            const url = id ? `/products/${id}` : '/products';
            const res = await apiRequest(url, {
                method,
                body: JSON.stringify(payload)
            });
            if (res.success) {
                toasty(res.message);
                closeModal();
                loadProducts();
            }
        } catch (err) { 
            if (window.supabase) {
                try {
                    const _db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    let res;
                    if (id) {
                        res = await _db.from('products').update(payload).eq('id', id);
                    } else {
                        res = await _db.from('products').insert([payload]);
                    }
                    if (!res.error) {
                        toasty(id ? "Product updated (Offline Sync)" : "Product added (Offline Sync)");
                        closeModal();
                        loadProducts();
                        return;
                    }
                } catch(dbErr) {}
            }
            toasty(err.message, 'error'); 
        }
    }

    async function deleteProduct(id) {
        if (!confirm('Delete this product?')) return;
        try {
            const res = await apiRequest(`/products/${id}`, { method: 'DELETE' });
            if (res.success) { toasty('Product deleted'); loadProducts(); }
        } catch (err) { 
            if (window.supabase) {
                try {
                    const _db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    const { error } = await _db.from('products').delete().eq('id', id);
                    if (!error) {
                        toasty('Product deleted (Offline Sync)');
                        loadProducts();
                        return;
                    }
                } catch(dbErr) {}
            }
            toasty(err.message, 'error'); 
        }
    }

    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('user'); window.location.href = '../index.html'; };
    loadProducts();
</script>
</body>
</html>
