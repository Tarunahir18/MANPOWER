<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – MANPOWER Sports</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<div id="loginPage" style="display:block;">
    <div class="login-logo">
        <img src="../assets/images/manpower-logo.png" alt="MANPOWER Logo">
        <h2>Reset Password</h2>
    </div>
    <p style="color:var(--text-muted); text-align:center; margin-bottom:20px; font-size:14px;">Enter your email to receive a reset code.</p>

    <div class="message" id="message"></div>

    <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    <div id="codeGroup" style="display: none;">
        <label for="code">Reset Code</label>
        <input type="text" id="code" placeholder="6-digit code">
    </div>
    <div id="newPasswordGroup" style="display: none;">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password">
    </div>

    <button id="submitBtn" class="btn-primary" style="width:100%; margin-top:16px;" onclick="handlePasswordReset()">Send Reset Code</button>

    <div class="toggle-link" style="margin-top:16px;">
        <a href="../index.html">← Back to Login</a>
    </div>
</div>

<script>
    const createApiCandidates = () => {
        const { protocol, hostname, port, origin } = window.location;
        const host = hostname || 'localhost';
        const scheme = protocol === 'file:' ? 'http:' : protocol;
        const currentPort = port || (scheme === 'https:' ? '443' : '80');
        const ports = ['3000', '3001', '3002', '5000', '5001', '8000', '8080', '5500', '5501'];
        const candidates = [];
        if (protocol !== 'file:' && currentPort && !['80', '443'].includes(currentPort)) {
            candidates.push(`${origin}/api/v1`);
        }
        ports.forEach((p) => candidates.push(`${scheme}//${host}:${p}/api/v1`));
        candidates.push('http://localhost:3000/api/v1', 'http://127.0.0.1:3000/api/v1');
        return [...new Set(candidates)];
    };

    async function detectApiUrl() {
        if (window.__API_URL__) return window.__API_URL__;
        for (const base of createApiCandidates()) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1200);
                const response = await fetch(`${base}/health`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.ok) { window.__API_URL__ = base; return base; }
            } catch (e) {}
        }
        window.__API_URL__ = 'http://localhost:3000/api/v1';
        return window.__API_URL__;
    }

    let resetStep = 'email';
    let resetEmail = '';

    function showMessage(msg, type) {
        const msgEl = document.getElementById('message');
        msgEl.innerText = msg;
        msgEl.className = `message ${type} show`;
        if (type === 'success') msgEl.style.borderLeftColor = 'var(--primary)';
        msgEl.style.display = 'block';
        setTimeout(() => { msgEl.style.display = 'none'; }, 4000);
    }

    async function handlePasswordReset() {
        const email = document.getElementById('email').value;
        const code = document.getElementById('code').value;
        const newPassword = document.getElementById('newPassword').value;
        const button = document.getElementById('submitBtn');

        if (resetStep === 'email') {
            if (!email) { showMessage('Please enter your email', 'error'); return; }
            try {
                const apiBase = await detectApiUrl();
                const res = await fetch(`${apiBase}/password-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, step: 'request' })
                });
                const data = await res.json();
                if (data.success) {
                    resetEmail = email;
                    resetStep = 'code';
                    document.getElementById('email').disabled = true;
                    document.getElementById('codeGroup').style.display = 'block';
                    document.getElementById('newPasswordGroup').style.display = 'block';
                    button.innerText = 'Reset Password';
                    showMessage('Reset code sent to your email!', 'success');
                } else {
                    showMessage(data.message || 'Error', 'error');
                }
            } catch (err) {
                showMessage('Server error: ' + err.message, 'error');
            }
        } else if (resetStep === 'code') {
            if (!code || !newPassword) { showMessage('Please enter code and new password', 'error'); return; }
            try {
                const apiBase = await detectApiUrl();
                const res = await fetch(`${apiBase}/password-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail, code, newPassword, step: 'confirm' })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Password reset successfully!', 'success');
                    setTimeout(() => window.location.href = '../index.html', 2000);
                } else {
                    showMessage(data.message || 'Error', 'error');
                }
            } catch (err) {
                showMessage('Server error: ' + err.message, 'error');
            }
        }
    }

    document.getElementById('email').addEventListener('keypress', (e) => { if (e.key === 'Enter' && resetStep === 'email') handlePasswordReset(); });
    document.getElementById('newPassword')?.addEventListener('keypress', (e) => { if (e.key === 'Enter' && resetStep === 'code') handlePasswordReset(); });
</script>
</body>
</html>
