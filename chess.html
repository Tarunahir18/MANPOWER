<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Enrollment – MANPOWER Sports</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:
        linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.75)),
        url("previous_background.png") no-repeat center/cover fixed;
    background-size:cover;
    color:#fff;
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Navbar */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:18px 40px;
    background:rgba(0,0,0,0.55);
    display:flex;
    justify-content:flex-end;
    gap:20px;
    z-index:10;
}

nav a{
    color:#00ffae;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
}

nav a:hover{ color:#fff; }

/* Main Container */
.container{
    max-width:1000px;
    margin:110px auto 60px;
    background:rgba(0,0,0,0.7);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.9);
}

h1{
    text-align:center;
    color:#00ffae;
    margin-bottom:35px;
    font-size:32px;
}

/* ===== SLIDER ===== */
.slider{
    position:relative;
    width:100%;
    height:320px;
    overflow:hidden;
    border-radius:18px;
    background:#000;
    margin-bottom:45px;
}

.slide{
    position:absolute;
    inset:0;
    opacity:0;
    transform:scale(1.02);
    transition:opacity 1.6s ease, transform 2.5s ease;
}

.slide.active{
    opacity:1;
    transform:scale(1);
}

.slide img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

.caption{
    position:absolute;
    bottom:20px;
    left:20px;
    background:rgba(0,0,0,0.65);
    padding:10px 18px;
    border-radius:10px;
    font-size:20px;
    color:#00ffae;
}

/* ===== FORM SECTION ===== */
.form-section{
    margin-top:20px;
    padding:25px;
    background:rgba(255,255,255,0.06);
    border-radius:18px;
    box-shadow:inset 0 0 15px rgba(255,255,255,0.05);
}

.form-title{
    text-align:center;
    font-size:26px;
    color:#00ffae;
    margin-bottom:20px;
}

/* Responsive iframe */
.form-wrapper{
    position:relative;
    width:100%;
    padding-top:120%;
    border-radius:14px;
    overflow:hidden;
}

.form-wrapper iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    background:#fff;
}
</style>
</head>

<body>

<div class="overlay"></div>

<nav>
    <a href="home.html">Home</a>
    <a href="notification.html">Notifications</a>
    <a href="games.html">Games</a>
    <a href="contact us.html">Contact Us</a>
</nav>

<div class="container">
    <h1>Chess Enrollment</h1>

    <!-- Slider -->
    <div class="slider">

        <div class="slide active">
            <img src="gukesh.png">
            <div class="caption">World Champion – Gukesh D</div>
        </div>

        <div class="slide">
            <img src="deshmukh.png">
            <div class="caption">Grandmaster – Divya Deshmukh</div>
        </div>

        <div class="slide">
            <img src="anand.png">
            <div class="caption remembering">Legend – Viswanathan Anand</div>
        </div>

    </div>

    <!-- Google Form -->
    <div class="form-section">
        <div class="form-title">Register for Chess Tournament</div>

        <div class="form-wrapper">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSdZNcaD1Ba0cV_ZLaQ8ea9ehlrDlmDx3BcWFB_-OZ-IfbTWaw/viewform?embedded=true">
            </iframe>
        </div>
    </div>

</div>

<script>
const slides = document.querySelectorAll(".slide");
let index = 0;

/* Premium slow autoplay */
setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 6000);
</script>

</body>
</html>
